
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system

spec:
  interval: 5m

  chart:
    spec:
      chart: actions-runner-controller
      version: "0.23.5"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: actions-runner-system

  install:
    crds: Create

  upgrade:
    crds: CreateReplace

  values:
    authSecret:
      create: false

    certManager:
      enabled: true

    webhook:
      enabled: true
