apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-v2-runner-manager
rules:
  # Core resources needed for runner lifecycle
  - apiGroups: [""]
    resources: ["pods", "pods/log", "serviceaccounts", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC objects created per scale set
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leases for controller coordination
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
